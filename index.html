<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Candy ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:'Playfair Display',serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* Estrellas */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://www.transparenttextures.com/patterns/stardust.png');
    animation:moveStars 60s linear infinite;
}

@keyframes moveStars{
    from{background-position:0 0;}
    to{background-position:10000px 5000px;}
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.card{
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:20px;
    max-width:500px;
    width:100%;
    backdrop-filter:blur(10px);
    box-shadow:0 0 40px rgba(255,105,180,0.5);
    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

h1{
    font-family:'Dancing Script',cursive;
    font-size:clamp(2.5rem,5vw,3.5rem);
    color:#ff9ff3;
    animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #ff69b4;}
    to{text-shadow:0 0 25px #ff1493;}
}

p{
    font-size:clamp(1rem,3vw,1.2rem);
    line-height:1.6;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#ff6b6b,#ff1493);
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.heart{
    font-size:3rem;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}

/* Responsive extra */
@media(max-width:480px){
    .card{
        padding:20px;
    }
}

</style>
</head>
<body>

<div class="stars"></div>

<div class="container">
    <div class="card">
        <h1>Para Candy ❤️</h1>
        <p>
            Desde que llegaste a mi vida, todo tiene más sentido.
            No sé cómo explicarlo… pero contigo todo se siente hogar.
        </p>

        <p>
            Quiero elegirte todos los días,
            incluso en los días difíciles,
            incluso cuando el mundo no sea perfecto.
        </p>

        <div class="heart">❤️</div>

        <button onclick="mostrarMensaje()">Haz clic aquí</button>

        <p id="mensajeFinal" style="display:none; margin-top:20px; font-weight:bold; color:#ffb6f9;">
            Te amo más de lo que las palabras pueden expresar 💍✨
        </p>
    </div>
</div>

<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<script>
function mostrarMensaje(){
    document.getElementById("mensajeFinal").style.display="block";
}
</script>

</body>
</html>
